<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>石頭天空島 - 寵物戰力模擬器 Pro</title>
    <style>
        :root {
            --primary-color: #4A90E2;
            --secondary-color: #28a745;
            --bg-color: #e9ecef;
        }

        body { 
            font-family: -apple-system, "Microsoft JhengHei", sans-serif; 
            background: var(--bg-color); 
            display: flex; 
            justify-content: center; 
            align-items: center; 
            min-height: 100vh;
            margin: 0; 
        }

        .main-container {
            display: flex;
            background: white;
            border-radius: 20px;
            box-shadow: 0 20px 40px rgba(0,0,0,0.2);
            overflow: hidden;
            width: 95%;
            max-width: 900px;
            flex-direction: row;
        }

        /* 左側圖片區 */
        .banner-side {
            flex: 1.2;
            background: #000;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .banner-side img {
            width: 100%;
            height: 100%;
            object-fit: cover; /* 確保圖片填滿且不變形 */
        }

        /* 右側計算區 */
        .calc-side {
            flex: 1;
            padding: 30px;
            background: #fff;
            display: flex;
            flex-direction: column;
        }

        h2 { text-align: center; color: #333; margin-top: 0; border-bottom: 2px solid var(--bg-color); padding-bottom: 10px; }

        .grid-inputs {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 15px;
            margin-bottom: 20px;
        }

        .input-group label { display: block; font-weight: bold; margin-bottom: 5px; color: #666; font-size: 14px; }
        input { 
            width: 100%; padding: 10px; border: 2px solid #eee; border-radius: 8px; 
            box-sizing: border-box; font-size: 16px; transition: 0.3s;
        }
        input:focus { border-color: var(--primary-color); outline: none; background: #f0f7ff; }

        .result-box { 
            background: linear-gradient(135deg, var(--primary-color), #357abd); 
            color: white; padding: 15px; border-radius: 12px; text-align: center; margin-bottom: 20px; 
        }
        .result-label { font-size: 14px; opacity: 0.9; }
        .result-val { font-size: 36px; font-weight: 900; }

        button { 
            width: 100%; padding: 12px; background: var(--secondary-color); color: white; 
            border: none; border-radius: 8px; font-size: 16px; cursor: pointer; font-weight: bold; transition: 0.3s;
        }
        button:hover { background: #218838; transform: translateY(-2px); }

        .history-container { margin-top: 20px; max-height: 200px; overflow-y: auto; border-top: 1px dashed #ccc; }
        table { width: 100%; border-collapse: collapse; font-size: 13px; }
        th, td { padding: 8px; text-align: center; border-bottom: 1px solid #eee; }
        th { color: #999; }

        /* 手機版適應 */
        @media (max-width: 768px) {
            .main-container { flex-direction: column; margin: 20px; }
            .banner-side { height: 200px; }
        }
    </style>
</head>
<body>

<div class="main-container">
    <div class="banner-side">
        <img src="header.png" alt="石頭天空島 Header">
    </div>

    <div class="calc-side">
        <h2>寵物戰力計算機</h2>
        
        <div class="grid-inputs">
            <div class="input-group"><label>血量 (HP)</label><input type="number" id="hp" placeholder="0" oninput="calculate()"></div>
            <div class="input-group"><label>攻擊 (ATK)</label><input type="number" id="atk" placeholder="0" oninput="calculate()"></div>
            <div class="input-group"><label>防禦 (DEF)</label><input type="number" id="def" placeholder="0" oninput="calculate()"></div>
            <div class="input-group"><label>敏捷 (SPD)</label><input type="number" id="spd" placeholder="0" oninput="calculate()"></div>
        </div>
        
        <div class="result-box">
            <div class="result-label">當前估算戰力</div>
            <div id="totalCP" class="result-val">0</div>
        </div>
        
        <button onclick="saveRecord()">儲存寵物紀錄</button>

        <div class="history-container">
            <table id="history">
                <thead><tr><th>屬性分配 (H/A/D/S)</th><th>戰力</th></tr></thead>
                <tbody></tbody>
            </table>
        </div>
    </div>
</div>

<script>
    function calculate() {
        const hp = parseFloat(document.getElementById('hp').value) || 0;
        const atk = parseFloat(document.getElementById('atk').value) || 0;
        const def = parseFloat(document.getElementById('def').value) || 0;
        const spd = parseFloat(document.getElementById('spd').value) || 0;
        
        // 使用你的公式：(HP/4) + ATK + DEF + SPD
        const cp = ((hp / 4) + atk + def + spd).toFixed(1);
        document.getElementById('totalCP').innerText = cp.endsWith('.0') ? parseInt(cp) : cp;
    }

    function saveRecord() {
        const cp = document.getElementById('totalCP').innerText;
        if(cp === "0") return;

        const hp = document.getElementById('hp').value || 0;
        const atk = document.getElementById('atk').value || 0;
        const def = document.getElementById('def').value || 0;
        const spd = document.getElementById('spd').value || 0;

        const tbody = document.querySelector('#history tbody');
        const row = tbody.insertRow(0);
        
        row.innerHTML = `
            <td>${hp}/${atk}/${def}/${spd}</td>
            <td style="font-weight:bold; color:#28a745;">${cp}</td>
        `;
    }
</script>

</body>
</html>
